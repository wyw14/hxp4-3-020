<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星界神话 - 谐波共振星座</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      #gameCanvas {
        display: block;
        cursor: crosshair;
      }
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        color: #fff;
      }
      .hud {
        position: absolute;
        padding: 16px 24px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(100, 150, 255, 0.3);
        border-radius: 12px;
        font-size: 14px;
      }
      #level-info {
        top: 20px;
        left: 20px;
      }
      #hint-box {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        max-width: 600px;
      }
      #hint-box .title {
        font-size: 18px;
        font-weight: bold;
        color: #a0c4ff;
        margin-bottom: 8px;
      }
      #progress-bar {
        top: 20px;
        right: 20px;
        min-width: 180px;
      }
      .progress-bar-container {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .btn {
        pointer-events: auto;
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        margin: 0 5px;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      #complete-modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        background: rgba(10, 15, 40, 0.95);
        border: 2px solid rgba(160, 196, 255, 0.5);
        border-radius: 20px;
        padding: 40px 60px;
        text-align: center;
        pointer-events: auto;
        transition: transform 0.5s ease;
      }
      #complete-modal.show {
        transform: translate(-50%, -50%) scale(1);
      }
      #complete-modal h2 {
        font-size: 32px;
        color: #ffd700;
        margin-bottom: 16px;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }
      #complete-modal p {
        font-size: 16px;
        color: #a0c4ff;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      #complete-modal .stats-box {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(160, 196, 255, 0.2);
        border-radius: 10px;
        padding: 12px 20px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        gap: 24px;
        font-size: 14px;
      }
      #complete-modal .stats-box .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      #complete-modal .stats-box .stat-label {
        color: #888;
        font-size: 12px;
      }
      #complete-modal .stats-box .stat-value {
        color: #ffd700;
        font-size: 18px;
        font-weight: bold;
      }
      #buttons-container {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: auto;
      }
      #btn-achievements {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #btn-achievements .badge-count {
        background: #ffd700;
        color: #333;
        border-radius: 10px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: bold;
      }
      #achievement-wall {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 10, 30, 0.98);
        z-index: 1000;
        display: none;
        overflow-y: auto;
        pointer-events: auto;
      }
      #achievement-wall.show {
        display: block;
      }
      .wall-header {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 24px;
      }
      .wall-title {
        text-align: center;
        margin-bottom: 32px;
      }
      .wall-title h1 {
        font-size: 42px;
        background: linear-gradient(135deg, #ffd700, #ff6b9d, #667eea);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }
      .wall-progress {
        text-align: center;
        color: #a0c4ff;
        margin-bottom: 12px;
        font-size: 18px;
      }
      .wall-progress-bar {
        max-width: 500px;
        margin: 0 auto 24px;
        height: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 5px;
        overflow: hidden;
      }
      .wall-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #ffd700, #ff6b9d);
        border-radius: 5px;
        transition: width 0.6s ease;
      }
      .badge-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }
      .badge-card {
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .badge-card.unlocked {
        border-color: rgba(102, 126, 234, 0.5);
        background: rgba(102, 126, 234, 0.08);
      }
      .badge-card.unlocked.rarity-common.unlocked { border-color: rgba(156, 163, 175, 0.5); background: rgba(156, 163, 175, 0.08); }
      .badge-card.rarity-rare.unlocked { border-color: rgba(59, 130, 246, 0.5); background: rgba(59, 130, 246, 0.08); }
      .badge-card.rarity-epic.unlocked { border-color: rgba(168, 85, 247, 0.5); background: rgba(168, 85, 247, 0.08); }
      .badge-card.rarity-legendary.unlocked {
        border-color: rgba(255, 215, 0, 0.6);
        background: rgba(255, 215, 0, 0.08);
        animation: legendary-glow 3s ease-in-out infinite;
      }
      @keyframes legendary-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); }
      }
      .badge-icon {
        font-size: 56px;
        margin-bottom: 12px;
        filter: grayscale(1) opacity(0.3);
        transition: all 0.3s;
      }
      .badge-card.unlocked .badge-icon {
        filter: grayscale(0) opacity(1);
      }
      .badge-name {
        font-size: 16px;
        font-weight: bold;
        color: #fff;
        margin-bottom: 8px;
      }
      .badge-card.locked .badge-name {
        color: #666;
      }
      .badge-desc {
        font-size: 13px;
        color: #a0c4ff;
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .badge-card.locked .badge-desc {
        color: #555;
      }
      .badge-hint {
        font-size: 11px;
        color: #888;
        font-style: italic;
        padding-top: 10px;
        border-top: 1px solid rgba(255,255,255,0.05);
      }
      .badge-rarity {
        display: inline-block;
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        margin-bottom: 8px;
        font-weight: bold;
      }
      .badge-rarity.common { background: rgba(156,163,175,0.2); color: #9ca3af; }
      .badge-rarity.rare { background: rgba(59,130,246,0.2); color: #60a5fa; }
      .badge-rarity.epic { background: rgba(168,85,247,0.2); color: #c084fc; }
      .badge-rarity.legendary { background: rgba(255,215,0,0.2); color: #ffd700; }
      .badge-unlock-date {
        font-size: 11px;
        color: #666;
        margin-top: 8px;
      }
      .wall-actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 32px;
      }
      #btn-close-wall {
        position: absolute;
        top: 24px;
        right: 24px;
        pointer-events: auto;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }
      #btn-close-wall:hover {
        background: rgba(255,255,255,0.2);
      }
      .level-records {
        margin-top: 40px;
        padding: 24px;
        background: rgba(255,255,255,0.03);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
      }
      .level-records h2 {
        text-align: center;
        color: #a0c4ff;
        margin-bottom: 20px;
        font-size: 20px;
      }
      .records-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .record-card {
        background: rgba(255,255,255,0.04);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .record-card.completed {
        border: 1px solid rgba(100, 200, 100, 0.3);
      }
      .record-level-name {
        font-size: 16px;
        color: #fff;
        font-weight: bold;
        margin-bottom: 8px;
      }
      .record-status {
        font-size: 12px;
        color: #888;
        margin-bottom: 10px;
      }
      .record-status.completed { color: #5fd35f; }
      .record-detail {
        font-size: 12px;
        color: #a0c4ff;
        line-height: 1.8;
      }
      .new-badge-toast {
        position: fixed;
        top: 80px;
        right: 24px;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border: 2px solid rgba(255, 215, 0, 0.5);
        border-radius: 16px;
        padding: 16px 24px;
        pointer-events: auto;
        z-index: 2000;
        transform: translateX(400px);
        transition: transform 0.5s ease;
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 280px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      }
      .new-badge-toast.show {
        transform: translateX(0);
      }
      .toast-icon {
        font-size: 40px;
      }
      .toast-content {
        flex: 1;
      }
      .toast-label {
        font-size: 12px;
        color: #ffd700;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .toast-name {
        font-size: 16px;
        color: #fff;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .toast-desc {
        font-size: 12px;
        color: #a0c4ff;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-bYwmPcrI.js"></script>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
      <button class="btn" id="btn-achievements">
        🏆 成就墙 <span class="badge-count" id="badge-count">0/0</span>
      </button>
      <div class="hud" id="level-info">
        <div>第 <span id="level-num">1</span> 关</div>
        <div style="margin-top: 6px; color: #a0c4ff;">神话生物: <span id="creature-name">未知</span></div>
        <div style="margin-top: 6px; font-size: 12px; color: #888;">已连接: <span id="connected-count">0</span> / <span id="total-count">0</span></div>
      </div>
      <div class="hud" id="progress-bar">
        <div>星座完成度</div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="hud" id="hint-box">
        <div class="title" id="hint-title">观察星空</div>
        <div id="hint-text">寻找闪烁频率成倍数关系的恒星，用鼠标拖动连接它们</div>
      </div>
      <div id="buttons-container">
        <button class="btn" id="btn-undo">撤销连线</button>
        <button class="btn" id="btn-reset">重置本关</button>
        <button class="btn" id="btn-hint">显示频率</button>
      </div>
      <div id="complete-modal">
        <h2 id="modal-title">✨ 星座完成 ✨</h2>
        <div class="stats-box" id="modal-stats">
          <div class="stat-item">
            <span class="stat-label">用时</span>
            <span class="stat-value" id="stat-time">0s</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">错误次数</span>
            <span class="stat-value" id="stat-errors">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">使用提示</span>
            <span class="stat-value" id="stat-hint">否</span>
          </div>
        </div>
        <p id="modal-desc"></p>
        <button class="btn" id="btn-next">下一关</button>
      </div>
    </div>
    <div id="achievement-wall">
      <button id="btn-close-wall">✕</button>
      <div class="wall-header">
        <div class="wall-title">
          <h1>✨ 星界成就墙 ✨</h1>
        </div>
        <div class="wall-progress" id="wall-progress-text">已解锁 0 / 0 个成就</div>
        <div class="wall-progress-bar">
          <div class="wall-progress-fill" id="wall-progress-fill" style="width: 0%"></div>
        </div>
        <div class="badge-grid" id="badge-grid"></div>
        <div class="level-records">
          <h2>📊 关卡记录</h2>
          <div class="records-grid" id="records-grid"></div>
        </div>
        <div class="wall-actions">
          <button class="btn" id="btn-reset-achievements">重置所有成就</button>
        </div>
      </div>
    </div>
  </body>
</html>
